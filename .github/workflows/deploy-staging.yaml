name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Test frontend
        working-directory: web
        run: npm test --if-present

      - name: Build frontend
        working-directory: web
        run: npm run build

  test-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/api/go.sum

      - name: Test Go backend
        working-directory: services/api
        run: go test ./...

  test-speech-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/speech-engine
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests if present
        working-directory: services/speech-engine
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory found. Skipping."
          fi

  deploy-staging:
    runs-on: ubuntu-latest
    environment: Production – sona-voice

    needs:
      - test-frontend
      - test-api
      - test-speech-engine

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_APP_NAME: ${{ vars.MODAL_APP_NAME }}
      MODAL_SECRET_NAME: ${{ vars.MODAL_SECRET_NAME }}

      VERCEL_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}

      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      ICE_SERVERS: ${{ secrets.ICE_SERVERS }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Restore Terraform tfvars
        working-directory: infrastructure/environments/staging
        run: |
          cat > config.auto.tfvars <<'EOF'
          ${{ secrets.TFVARS_CONTENT }}
          EOF

      - name: Terraform apply staging
        working-directory: infrastructure/environments/staging
        run: |
          terraform init
          terraform validate
          terraform apply -auto-approve

      - name: Read Terraform outputs
        working-directory: infrastructure/environments/staging
        run: |
          echo "DATABASE_URL=$(terraform output -raw database_url)" >> "$GITHUB_ENV"
          echo "API_URL=$(terraform output -raw api_url)" >> "$GITHUB_ENV"
          echo "SPEECH_SENTRY_DSN=$(terraform output -json sentry_project_dsns | jq -r '."sona-python-pipecat"')" >> "$GITHUB_ENV"
          echo "VERCEL_API_PROJECT_NAME=$(terraform output -raw vercel_api_project_name)" >> "$GITHUB_ENV"

      - name: Run API migrations
        working-directory: services/api
        run: make migrate-up

      - name: Sync secrets to Modal
        run: |
          modal secret delete "$MODAL_SECRET_NAME" --env staging --yes || true

          modal secret create "$MODAL_SECRET_NAME" \
            DATABASE_URL="$DATABASE_URL" \
            API_URL="$API_URL/api/v1" \
            OPENAI_BASE_URL="$OPENAI_BASE_URL" \
            DEEPGRAM_API_KEY="$DEEPGRAM_API_KEY" \
            GOOGLE_API_KEY="$GOOGLE_API_KEY" \
            OPENCODE_API_KEY="$OPENCODE_API_KEY" \
            SENTRY_DSN="$SPEECH_SENTRY_DSN" \
            ICE_SERVERS="$ICE_SERVERS" \
            MODAL_APP_NAME="$MODAL_APP_NAME" \
            --env staging

      - name: Deploy Modal speech engine
        working-directory: services/speech-engine
        run: |
          modal deploy -m modal_app --env staging | tee deploy.log

          SPEECH_SERVICE_URL=$(
            grep -oE 'https://[^ ]+\.modal\.run' deploy.log | head -n 1
          )

          if [ -z "$SPEECH_SERVICE_URL" ]; then
            echo "Failed to extract SPEECH_SERVICE_URL"
            cat deploy.log
            exit 1
          fi

          echo "SPEECH_SERVICE_URL=$SPEECH_SERVICE_URL" >> "$GITHUB_ENV"
      - name: Sync SPEECH_SERVICE_URL to Vercel
        run: |
          PROJECT_ID="$VERCEL_API_PROJECT_NAME"
          
          curl -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
          -H "Authorization: Bearer $VERCEL_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"key\": \"SPEECH_SERVICE_URL\",
            \"value\": \"$SPEECH_SERVICE_URL\",
            \"target\": [\"production\", \"preview\"],
            \"type\": \"plain\"
          }"