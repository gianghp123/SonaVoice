basePath: /api/v1
definitions:
  errors.AppError:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  res.IceConfig:
    properties:
      iceServers:
        items:
          $ref: '#/definitions/res.IceServer'
        type: array
    type: object
  res.IceServer:
    properties:
      credential:
        description: for TURN servers
        type: string
      urls:
        items:
          type: string
        type: array
      username:
        description: for TURN servers
        type: string
    type: object
  res.WebRTCConnectionRes:
    properties:
      iceConfig:
        allOf:
        - $ref: '#/definitions/res.IceConfig'
        description: 'only if enableDefaultIceServers: true'
      sessionId:
        type: string
    type: object
  response.BaseResponse-any:
    properties:
      data: {}
      error:
        $ref: '#/definitions/errors.AppError'
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.BaseResponse-res_WebRTCConnectionRes:
    properties:
      data:
        $ref: '#/definitions/res.WebRTCConnectionRes'
      error:
        $ref: '#/definitions/errors.AppError'
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Model Gateway API
  version: "1.0"
paths:
  /model-gateway/sessions/{sessionId}/offer:
    patch:
      consumes:
      - application/json
      description: Proxy a WebRTC offer request to the speech service by session ID
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: WebRTC offer request body
        in: body
        name: body
        required: true
        schema: {}
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
      security:
      - Bearer: []
      summary: Proxy WebRTC offer
      tags:
      - model-gateway
    post:
      consumes:
      - application/json
      description: Proxy a WebRTC offer request to the speech service by session ID
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: WebRTC offer request body
        in: body
        name: body
        required: true
        schema: {}
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
      security:
      - Bearer: []
      summary: Proxy WebRTC offer
      tags:
      - model-gateway
  /model-gateway/start:
    post:
      consumes:
      - application/json
      description: Start a new WebRTC session with the speech service and return connection
        information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.BaseResponse-res_WebRTCConnectionRes'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.BaseResponse-any'
      security:
      - Bearer: []
      summary: Create WebRTC connection
      tags:
      - model-gateway
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
